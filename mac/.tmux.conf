# Enable mouse support
set -g mouse on

# Keep the default tmux prefix
set -g prefix C-b

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Unbind default split keys
unbind '"'
unbind %
unbind c
unbind &
unbind ,
unbind r

# Window shortcuts
bind o new-window
bind c kill-window
unbind R
bind r command-prompt -I "#W" { rename-window "%%" }

set -g status-right '#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}"#{=21:pane_title}"'

# Start numbering from 1 and keep indices compact after closing windows.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Move current window to a target index with Prefix + m.
bind m command-prompt -p "Move current window to index:" "move-window -t '%%'; display-message 'Moved window to index %%'"

# Show a quick help popup with Prefix + h.
bind h display-popup -E -w 70% -h 70% "printf '%s\n' 'Tmux Key Help' '' 'Prefix: Ctrl+b' '' 'Window:' '  o  -> new window' '  c  -> kill current window' '  r  -> rename current window' '  m  -> move current window to target index' '' 'Pane:' '  |  -> split horizontally' '  -  -> split vertically' '' 'Other:' '  h  -> this help popup'; printf '\nPress any key to close...'; read -n 1"
